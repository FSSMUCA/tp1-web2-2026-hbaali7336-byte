<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Exercice 2</title>
  </head>
  <body>
    <h1>Exercice 2 — Variables avec let</h1>

    <script>
      // Déclaration des variables (camelCase + let)

      let prenom = "Hamza";       
      let age = 19;
      let ville = "Marrakech";
      let taille = 1.70;
      let aimeLeJs = true;

      // Affichage des variables

      console.log("Prénom :", prenom);
      console.log("Âge :", age);
      console.log("Ville :", ville);
      console.log("Taille :", taille);
      console.log("Aime le JS :", aimeLeJs);

      // Modification de l'âge (anniversaire)

      age = age + 1;

      console.log("Nouvel âge :", age);
    </script>
  </body>
</html>
