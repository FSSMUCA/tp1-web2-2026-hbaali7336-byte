<body>

<script>

    // Variables corrigées (camelCase)

    let premierPrix = 100;
    let deuxiemePrix = 80;
    let prixMinimum = 50;
    let prixSpecial = 200; // remplace "var"
    let prixMaximum = 300;

    // Calcul du prix moyen (logique inchangée)
    let prixMoyen = (premierPrix + deuxiemePrix + prixMinimum + prixSpecial + prixMaximum) / 5;

    // Affichages demandés
    console.log("Le prix moyen est : " + prixMoyen);
    console.log("Le prix minimum est : " + prixMinimum);
    console.log("Le prix maximum est : " + prixMaximum);

</script>
